name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Clone OmenTools
        run: git clone https://github.com/AtmoOmen/OmenTools.git ../OmenTools --depth 1

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dalamudDir = "${{ runner.temp }}\dalamud"
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile "$dalamudDir.zip"
          Expand-Archive "$dalamudDir.zip" -DestinationPath $dalamudDir

      - name: Build OmenTools
        run: dotnet build ../OmenTools/OmenTools.csproj -c Release
        env:
          DALAMUD_HOME: ${{ runner.temp }}\dalamud

      - name: Build
        run: dotnet build HiAuRo.Helper.csproj -c Release
        env:
          DALAMUD_HOME: ${{ runner.temp }}\dalamud

      - name: Collect DLLs for NuGet
        shell: pwsh
        run: |
          $dalamudDir = "${{ runner.temp }}\dalamud"
          New-Item -ItemType Directory -Force build | Out-Null

          Copy-Item bin\Release\HiAuRo.Helper.dll build\
          Copy-Item ..\OmenTools\bin\Release\OmenTools.dll build\

          $hiauro = Invoke-RestMethod "https://api.github.com/repos/denghaoxuan991876906/HiAuRo/releases/latest"
          $zipAsset = $hiauro.assets | Where-Object { $_.name -like "*.zip" } | Select-Object -First 1
          if ($zipAsset) {
            Invoke-WebRequest $zipAsset.browser_download_url -OutFile hiauro.zip
            Expand-Archive hiauro.zip -DestinationPath hiauro_tmp -Force
            Copy-Item hiauro_tmp\HiAuRo.dll build\ -ErrorAction SilentlyContinue
          }

          $dlls = @("Dalamud.dll","Dalamud.Common.dll","Dalamud.Bindings.ImGui.dll",
            "FFXIVClientStructs.dll","Lumina.dll","Lumina.Excel.dll",
            "ImGuiScene.dll","TerraFX.Interop.Windows.dll",
            "Newtonsoft.Json.dll","Serilog.dll","CheapLoc.dll")
          foreach ($dll in $dlls) {
            Copy-Item "$dalamudDir\$dll" build\ -ErrorAction SilentlyContinue
          }

      - name: Pack NuGet
        shell: pwsh
        run: |
          Invoke-WebRequest https://dist.nuget.org/win-x86-commandline/latest/nuget.exe -OutFile nuget.exe
          .\nuget.exe pack HiAuRo.Sdk.nuspec -OutputDirectory nuget -BasePath .

      - name: Upload NuGet artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo.Sdk.nupkg
          path: nuget/*.nupkg

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: windows-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo.Sdk.nupkg

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish to GitHub Packages
        run: dotnet nuget push *.nupkg --source "https://nuget.pkg.github.com/denghaoxuan991876906/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
