name: Build & Release

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dir = "${{ runner.temp }}\dalamud"
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile "$dir.zip"
          Expand-Archive "$dir.zip" -DestinationPath $dir

      - name: Build
        working-directory: ${{ github.workspace }}
        run: dotnet build -c Release /p:OutDir=${{ github.workspace }}\out\
        env:
          DALAMUD_HOME: ${{ runner.temp }}\dalamud

      - name: Show output
        shell: pwsh
        run: Get-ChildItem -Recurse out -Name

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo.Helper
          path: out/HiAuRo.Helper.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo.Helper
          path: ./artifact

      - name: Create Release Tag
        if: github.ref == 'refs/heads/main'
        run: |
          LATEST=$(git tag -l | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1)
          if [ -z "$LATEST" ]; then
            TAG="v0.1.0"
          else
            BASE=$(echo "$LATEST" | sed 's/\.[0-9]*$//')
            PATCH=$(echo "$LATEST" | sed 's/.*\.//')
            TAG="${BASE}.$((PATCH + 1))"
          fi
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          echo "递增版本: ${LATEST:-无} → ${TAG}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: artifact/**/HiAuRo.Helper.dll
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG || '' }}
