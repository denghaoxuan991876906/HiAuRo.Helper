name: Build & Release

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dalamudDir = "${{ runner.temp }}\dalamud"
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile "$dalamudDir.zip"
          Expand-Archive "$dalamudDir.zip" -DestinationPath $dalamudDir

      - name: Build OmenTools
        run: dotnet build OmenTools\OmenTools.csproj -c Release
        env:
          DALAMUD_HOME: ${{ runner.temp }}\dalamud

      - name: Clean obj
        shell: pwsh
        run: if (Test-Path obj) { Remove-Item -Recurse -Force obj }

      - name: Build
        run: dotnet build HiAuRo.Helper.csproj -c Release
        env:
          DALAMUD_HOME: ${{ runner.temp }}\dalamud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo.Helper
          path: bin/Release/HiAuRo.Helper.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo.Helper

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: HiAuRo.Helper.dll
          generate_release_notes: true
