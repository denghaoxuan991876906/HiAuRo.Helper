name: Build & Release

on:
  push:
    tags: ['v*']
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Dalamud
        shell: pwsh
        run: |
          $dir = "${{ runner.temp }}\dalamud"
          Invoke-WebRequest https://goatcorp.github.io/dalamud-distrib/latest.zip -OutFile "$dir.zip"
          Expand-Archive "$dir.zip" -DestinationPath $dir

      - name: Build
        working-directory: ${{ github.workspace }}
        run: dotnet build -c Release
        env:
          DALAMUD_HOME: ${{ runner.temp }}\dalamud

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: HiAuRo.Helper
          path: bin/Release/HiAuRo.Helper.dll

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: HiAuRo.Helper

      - name: Create Release Tag
        if: github.ref == 'refs/heads/main'
        run: |
          TAG="v$(date -u +%Y%m%d.%H%M%S)"
          echo "RELEASE_TAG=$TAG" >> $GITHUB_ENV
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: HiAuRo.Helper.dll
          generate_release_notes: true
          tag_name: ${{ env.RELEASE_TAG || '' }}
          prerelease: ${{ github.ref == 'refs/heads/main' }}
